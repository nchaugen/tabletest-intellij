name: Release New Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer (e.g. 0.2.3 or 0.2.3-rc.1). Leave empty to use gradle.properties."
        required: false
        type: string

concurrency:
  group: release-new-version
  cancel-in-progress: false

jobs:
  createTag:
    name: Create release tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Fetch Sources
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          current_version="$(grep "^pluginVersion" gradle.properties | sed 's/.*= *//')"
          input_version="${{ github.event.inputs.version }}"

          if [ -z "$input_version" ]; then
            version="$current_version"
            echo "Using version from gradle.properties: $version"
          else
            version="$input_version"
          fi

          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Error: version '$version' is not valid SemVer"
            exit 1
          fi

          echo "current_version=$current_version" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Validate sync and tag availability
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main --tags

          local_head="$(git rev-parse HEAD)"
          remote_head="$(git rev-parse origin/main)"
          if [ "$local_head" != "$remote_head" ]; then
            echo "Error: checked out main is not in sync with origin/main"
            exit 1
          fi

          tag="${{ steps.version.outputs.tag }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Error: tag $tag already exists locally"
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1 || \
             git ls-remote --exit-code --tags origin "refs/tags/$tag^{}" >/dev/null 2>&1; then
            echo "Error: tag $tag already exists on origin"
            exit 1
          fi

      - name: Update gradle.properties
        if: steps.version.outputs.version != steps.version.outputs.current_version
        shell: bash
        run: |
          set -euo pipefail
          sed -i "s/^pluginVersion *=.*/pluginVersion = ${{ steps.version.outputs.version }}/" gradle.properties

      - name: Run checks
        run: ./gradlew check

      - name: Commit version bump
        if: steps.version.outputs.version != steps.version.outputs.current_version
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add gradle.properties
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push origin main

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

      - name: Trigger build workflow for tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run build.yml \
            --ref "${{ steps.version.outputs.tag }}" \
            -f releaseTag="${{ steps.version.outputs.tag }}"

      - name: Summary
        run: |
          echo "Created and pushed tag: ${{ steps.version.outputs.tag }}"
          echo "Triggered Build workflow for tag: ${{ steps.version.outputs.tag }}"
